<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · Bilal Shabbir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc; --text: #0f172a; --muted: #475569; --faint: #94a3b8;
      --accent: #2563eb; --border: rgba(15,23,42,0.09);
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .code {
      font-family: var(--mono); font-size: 6rem; font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #4f46e5, #0ea5e9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 1.25rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.6rem; }
    p { color: var(--muted); font-size: 0.95rem; max-width: 380px; margin-bottom: 2.5rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.72rem 1.65rem; border-radius: 8px;
      background: var(--accent); color: #fff;
      font-weight: 700; font-size: 0.88rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    .hint { font-family: var(--mono); font-size: 0.7rem; color: var(--faint); margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or may have been moved.</p>
  <a href="/" class="btn">← Back to portfolio</a>
  <p class="hint">bilalshabbir123.github.io</p>
</body>
</html>
